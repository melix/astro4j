analysis.differential.velocity.help.phase1.explain2=East limb: plasma moves toward us -> blue shift
analysis.differential.velocity.help.phase1.explain3=West limb: plasma moves away from us -> red shift
analysis.differential.velocity.help.phase1.explain4=Dv = v_west - v_east = 2 x rotational velocity
