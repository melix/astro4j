# Step 1 - Requirements
requirements.title=Exigences de soumission BASS2000
requirements.warning=La base de donnťes BASS2000 est une archive d'observation solaire de l'observatoire de Meudon (Paris, France), remontant au 19Ťme siŤcle. L'effort de collaboration Pro-Amateur SOLAP vous permet de soumettre vos images solaires ŗ l'archive. Rappelons que les images SOLAP complťmentent les observations de Meudon en particulier lorsque aucune image pro n'est disponible : les soumissions partout dans le monde sont donc encouragťes ! Les rŤgles de soumission sont trŤs strictes, en raison de la nature scientifique de l'archive.
requirements.requirements=Exigences BASS2000:\n\n* Vous DEVEZ avoir lu et rempli l'accord de contribution (fichier PDF) sur https://bass2000.obspm.fr/solex.php\n* Les seuls instruments approuvťs sont le Sol'Ex (historique, v2, Pro, James) et MLAstro SHG 700\n* Uniquement des disques entiers pris sur un seul scan (pas de stack/mosaÔque)\n* Les images doivent Ítre soumises sans transformations supplťmentaires (pas d'amťlioration du contraste)\n* La correction de l'angle P doit Ítre appliquťe\n* Le tilt doit Ítre infťrieur ŗ 1į\n* La mise en station doit Ítre prťcise\n* Les mťtadonnťes appropriťes doivent Ítre fournies\n* Les images doivent Ítre correctement orientťes\n* Les longueurs d'onde doivent Ítre soit H-alpha, H-alpha continuum bleu, CaII K, CaII aile bleue, CaII H centre ou CaII aile bleue.
requirements.process=Cet assistant vous guidera ŗ travers:\n\n1. Comprťhension des exigences (cette ťtape)\n2. Vťrification de l'orientation de l'image\n3. Collecte des mťtadonnťes\n4. Gťnťration de fichier et tťlťchargement\n\nToute image soumise sans respecter ces exigences fera perdre du temps aux scientifiques qui l'examinent.\n\nNote: si la taille des pixels et/ou le binning est incorrect, vous devrez retraiter avec les paramŤtres corrects avant d'ouvrir cet assistant.
agreement=En continuant, vous acceptez de publier vos images dans le domaine public, libres de droit d'auteur.
registration.confirmation.title=Confirmation d'inscription SOLAP
registration.confirmation.header= tes-vous inscrit auprŤs de SOLAP ?
registration.confirmation.message=En cliquant sur OUI, vous confirmez avoir rempli le formulaire OBLIGATOIRE mentionnť dans les instructions ici, l'avoir envoyť ŗ l'ťquipe BASS2000 comme indiquť et avoir reÁu l'approbation pour la soumission. Les soumissions sans inscription seront rejetťes.

