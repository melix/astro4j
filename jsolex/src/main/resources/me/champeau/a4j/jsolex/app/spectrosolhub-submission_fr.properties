# Post-processing
postprocess.checkbox=Je souhaite post-traiter mes images en externe avant la publication
postprocess.title=Post-traitement
postprocess.generating=Génération des images...
postprocess.warning=Vous avez choisi de post-traiter vos fichiers avant de les téléverser sur SpectroSolHub.\n\
Cliquez sur le lien ci-dessous pour ouvrir le dossier contenant les fichiers à téléverser.\n\
Vous pouvez modifier le contenu des images (contraste, netteté, ajustements de couleur, etc.), mais vous NE DEVEZ PAS :\n\
\u2022 Renommer les fichiers\n\
\u2022 Modifier la résolution des images\n\
\u2022 Effectuer de changement géométrique (retournement, rotation, recadrage, redimensionnement, ...)\n\
\u2022 Ajouter ou supprimer des fichiers du dossier\n\
\u2022 Modifier le format des fichiers (les fichiers doivent rester en JPEG)\n\n\
Les métadonnées (position du disque solaire, raie spectrale, détails d'observation) sont calculées indépendamment et ne refléteront pas les modifications visuelles que vous apportez.\n\n\
Note : ces fichiers seront supprimés après le téléversement. Si vous souhaitez conserver vos images post-traitées, copiez-les dans un autre emplacement avant de continuer.
postprocess.open.folder=Ouvrir le dossier
postprocess.continue=Continuer le téléversement
