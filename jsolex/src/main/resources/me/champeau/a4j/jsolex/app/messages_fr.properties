analysis.differential.velocity.help.phase1.explain2=Limbe Est : le plasma s'approche -> décalage vers le bleu
analysis.differential.velocity.help.phase1.explain3=Limbe Ouest : le plasma s'éloigne -> décalage vers le rouge
analysis.differential.velocity.help.phase1.explain4=Dv = v_ouest - v_est = 2 x vitesse de rotation
