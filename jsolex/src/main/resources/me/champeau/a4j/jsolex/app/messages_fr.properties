analysis.differential.velocity.help.title=Comment fonctionne la mesure de la vitesse diffťrentielle
analysis.differential.velocity.help.text=La mesure de la vitesse diffťrentielle extrait les vitesses de rotation solaire en comparant les dťcalages Doppler entre les points des limbes Est et Ouest ŗ la mÍme latitude hťliographique.\n\n%ILLUSTRATION%\n\n**Processus de mesure :**\n1. Sťlectionner des paires de points aux limbes Est et Ouest ŗ la mÍme latitude\n2. Mesurer la position de la raie spectrale ŗ chaque point (ajustement de Voigt)\n3. Calculer la diffťrence de dťcalage Doppler : Ouest - Est\n4. Convertir en vitesse en utilisant la longueur d'onde et la gťomťtrie\n5. Moyenner plusieurs mesures ŗ chaque latitude pour rťduire le bruit\n\nLe rťsultat est comparť ŗ la courbe de rotation solaire thťorique de **Snodgrass & Ulrich (1990)**.
