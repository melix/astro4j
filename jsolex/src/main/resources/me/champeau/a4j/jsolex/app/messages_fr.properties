analysis.differential.velocity.title=Analyse de la vitesse différentielle
analysis.differential.velocity.description=Analyse les décalages Doppler pour calculer la vitesse différentielle. Cette fonctionnalité expérimentale effectue une analyse des décalages Doppler sur le disque solaire et produit un graphique montrant la variation de la vitesse du plasma à différentes latitudes.
analysis.differential.velocity.note=Note : Ceci nécessite que l'orientation du disque soit correcte (retournements vertical/horizontal). Vous pouvez la vérifier en ouvrant l'onglet GONG et en comparant votre image à l'image de référence.
analysis.differential.velocity.warning=Attention : Les résultats dépendent fortement des conditions de seeing et de la raie spectrale observée. Les meilleurs résultats sont obtenus avec un excellent seeing et un soleil "calme". L'utilisation de raies très larges comme Ca H/K ne donneront pas de bons résultats.
analysis.differential.velocity.help.title=Comment fonctionne la mesure de la vitesse différentielle
analysis.differential.velocity.help.text=La mesure de la vitesse différentielle extrait les vitesses de rotation solaire en comparant les décalages Doppler entre les points des limbes Est et Ouest à la même latitude héliographique.\n\n%ILLUSTRATION%\n\n**Processus de mesure :**\n1. Sélectionner des paires de points aux limbes Est et Ouest à la même latitude\n2. Mesurer la position de la raie spectrale à chaque point (ajustement de Voigt)\n3. Calculer la différence de décalage Doppler : Ouest - Est\n4. Convertir en vitesse en utilisant la longueur d'onde et la géométrie\n5. Moyenner plusieurs mesures à chaque latitude pour réduire le bruit\n\nLe résultat est comparé à la courbe de rotation solaire théorique de **Snodgrass & Ulrich (1990)**.
