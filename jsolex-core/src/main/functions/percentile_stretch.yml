name: PERCENTILE_STRETCH
category: ENHANCEMENT
description:
  fr: "Etire l'histogramme en mappant les percentiles specifies aux points noir et blanc."
  en: "Stretches histogram by mapping specified percentiles to black and white points."
arguments:
  - name: img
    description: Image(s)
    required: true
  - name: lo
    required: false
    description:
      fr: "Percentile bas (0-100), les valeurs en dessous deviennent noires (defaut: 0.1)"
      en: "Low percentile (0-100), values below become black (default: 0.1)"
  - name: hi
    required: false
    description:
      fr: "Percentile haut (0-100), les valeurs au dessus deviennent blanches (defaut: 99.9)"
      en: "High percentile (0-100), values above become white (default: 99.9)"
  - name: mask
    required: false
    description:
      fr: "Masque restreignant les pixels utilisés pour le calcul des percentiles (créé avec annulus_mask ou range_mask). L'étirement est toujours appliqué à l'image entière."
      en: "Mask restricting the pixels used for percentile computation (created with annulus_mask or range_mask). The stretch is still applied to the whole image."
  - name: clip
    required: false
    description:
      fr: "Stratégie d'écrêtage (défaut: 1). 0 : aucun écrêtage, transformation affine pure dont le gain ne dépend que des percentiles, les pixels hors de la plage peuvent sortir de la plage affichable — adapté à la normalisation d'images avant empilement. 1 : les pixels sous le percentile bas deviennent noirs, ceux au-dessus du percentile haut deviennent blancs. 2 : le point blanc est étendu jusqu'au pixel le plus brillant de l'image, ce qui évite d'écrêter les régions brillantes situées hors du masque."
      en: "Clipping strategy (default: 1). 0: no clipping, pure affine transformation whose gain only depends on the percentiles, pixels outside the range may end up outside the displayable range — suitable for normalizing images before stacking. 1: pixels below the low percentile become black, those above the high percentile become white. 2: the white point is extended to the brightest pixel of the image, which avoids clipping bright regions located outside of the mask."
examples:
  - "percentile_stretch(img(0))"
  - "percentile_stretch(img: img(0), lo: 0.5, hi: 99.5)"
  - "percentile_stretch(img(0), 1, 99)"
  - "percentile_stretch(img: img(0), mask: annulus_mask(1.05, 1.4), clip: 0)"
