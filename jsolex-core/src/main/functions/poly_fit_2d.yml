name: POLY_FIT_2D
category: MATHS
description:
  fr: "Ajuste une surface polynomiale 2D sur une image mono dans le disque solaire."
  en: "Fits a 2D polynomial surface to a mono image within the solar disk."
arguments:
  - name: image
    description:
      fr: "Image mono"
      en: "Mono image"
  - name: degree
    optional: true
    default: 3
    description:
      fr: "Degré du polynôme"
      en: "Polynomial degree"
examples:
  - "poly_fit_2d(signed_diff(img(0); img(1)))"
  - "poly_fit_2d(signed_diff(img(0); img(1)); 3)"
  - "poly_fit_2d(image: signed_diff(img(0); img(1)); degree: 3)"
